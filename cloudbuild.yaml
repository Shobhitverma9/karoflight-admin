steps:
  # 1. Install dependencies
  - name: 'node:18'
    entrypoint: 'npm'
    args: ['install']

  # 2. Build the production bundle
  - name: 'node:18'
    entrypoint: 'npm'
    args: ['run', 'build']
    env:
      - 'VITE_API_BASE_URL=/api'
      - 'VITE_RENDER_API_BASE_URL=https://api.airmbm.com/api'
      - 'VITE_ENV=production'
      - 'VITE_REDUX_PERSIST_SECRET=Asdsad213213fdsf23@12563'
      - 'VITE_TRIPJACK_API_URL=https://tripjack.com'
      - 'VITE_TRIPJACK_FLIGHT_TEST_API_KEY=11169367e74b88c5-5f27-4df7-b417-6a25fd01a520'
      - 'VITE_TRIPJACK_HOTEL_TEST_API_KEY=11169367e74b88c5-5f27-4df7-b417-6a25fd01a520'

  # 3. Deploy to Firebase Hosting (admin target)
  - name: 'node:18'
    entrypoint: 'npx'
    args: ['firebase-tools', 'deploy', '--only', 'hosting:admin', '--project', 'airmbm-website']

options:
  logging: CLOUD_LOGGING_ONLY
